<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}"
      rel="stylesheet"
    />
    <title>Games</title>
  </head>

  <body>
    <header>
      <div class="container">
        <h1>Games</h1>
      </div>
    </header>

    <main>
      <section>
        <div class="container">
          <div class="mt-3 d-flex">
            <a
              th:href="@{/games/create}"
              sec:authorize="hasAuthority('ADMIN')"
              class="btn btn-primary me-3"
              >Add a game</a
            >
            <form th:action="@{/games/search}" action="#" method="get">
              <div class="input-group">
                <input
                  class="input-item"
                  name="name"
                  type="text"
                  id="name"
                  th:value="${param.name}"
                />
                <button class="btn btn-primary" type="submit">Search</button>
              </div>
            </form>
            <form action="#" th:action="@{/games}" method="get">
              <button class="btn btn-secondary" type="submit">Reset</button>
            </form>
          </div>
          <div class="mt-3 text-center text-danger fs-1" th:if="${list.isEmpty()}">
            <span>Game not found</span>
          </div>
          <table th:if="${!list.isEmpty()}" class="table">
            <thead>
              <tr>
                <th scope="col">Id</th>
                <th scope="col">Name</th>
                <th scope="col">Release date</th>
                <th scope="col">Price</th>
                <th scope="col">Show</th>
                <th scope="col" sec:authorize="hasAuthority('ADMIN')">
                  Update
                </th>
                <th scope="col" sec:authorize="hasAuthority('ADMIN')">
                  Delete
                </th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${list}" th:object="${item}">
                <th scope="row" th:text="*{id}" />
                <td th:text="*{name}" />
                <td th:text="*{releaseDate}" />
                <td th:text="|*{price} €|" />
                <td>
                  <a
                    th:href="@{/games/{id}(id = *{id})}"
                    class="btn btn-primary"
                    >Show</a
                  >
                </td>
                <td sec:authorize="hasAuthority('ADMIN')">
                  <a
                    th:href="@{/games/edit/{id}(id = *{id})}"
                    class="btn btn-secondary"
                    >Update</a
                  >
                </td>
                <td sec:authorize="hasAuthority('ADMIN')">
                  <form
                    action="#"
                    th:action="@{/games/delete/{id}(id = *{id})}"
                    method="post"
                  >
                    <button type="submit" class="btn btn-danger" id="delete">
                      Delete
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
