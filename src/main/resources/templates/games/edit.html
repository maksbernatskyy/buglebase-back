<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}"
      rel="stylesheet"
    />
    <title>Edit</title>
  </head>

  <body>
    <header>
      <h1>Edit</h1>
    </header>

    <main>
      <section>
        <div class="container">
          <form
            id="game-form"
            th:object="${game}"
            th:action="@{/games/edit/{id}(id = *{id})}"
            method="post"
          >

            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input
                type="text"
                id="name"
                class="form-control"
                th:field="*{name}"
              />
              <div
                th:if="${#fields.hasErrors('name')}"
                th:errors="*{name}"
                class="text-danger"
              ></div>
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <input
                type="text"
                id="description"
                th:field="*{description}"
                class="form-control"
              />
              <div
                th:if="${#fields.hasErrors('description')}"
                th:errors="*{description}"
                class="text-danger"
              />
            </div>
            <div class="mb-3">
              <label for="releaseDate" class="form-label">Release Date</label>
              <input
                type="date"
                id="releaseDate"
                th:field="*{releaseDate}"
                class="form-control"
              />
              <div
                th:if="${#fields.hasErrors('releaseDate')}"
                th:errors="*{releaseDate}"
                class="text-danger"
              />
            </div>
            <div class="mb-3">
              <label for="price" class="form-label">Price</label>
              <input
                type="number"
                step="0.01"
                min="0"
                id="price"
                th:field="*{price}"
                class="form-control"
              />
              <div
                th:if="${#fields.hasErrors('price')}"
                th:errors="*{price}"
                class="text-danger"
              />
            </div>
            <div class="mb-3">
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
