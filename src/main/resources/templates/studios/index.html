<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}"
    />
    <title>Index</title>
  </head>

  <body>
    <header th:replace="~{/fragments/header :: header}" />

    <main>
      <div class="container">
        <h1>Studios</h1>
      </div>
      <section>
        <div class="container">
          <div class="mt-3">
            <a
              th:href="@{/studios/create}"
              class="btn btn-primary"
              sec:authorize="hasAuthority('ADMIN')"
              >Add a studio</a
            >
          </div>
          <table class="table">
            <thead>
              <tr>
                <th scope="col">Id</th>
                <th scope="col">Name</th>
                <th scope="col">Year of foundation</th>
                <th scope="col">Headquarters</th>
                <th scope="col">Show</th>
                <th scope="col" sec:authorize="hasAuthority('ADMIN')">Edit</th>
                <th scope="col" sec:authorize="hasAuthority('ADMIN')">
                  Delete
                </th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="studio : ${list}" th:object="${studio}">
                <th scope="row" th:text="*{id}" />
                <td th:text="*{name}" />
                <td th:text="*{yearFoundation}" />
                <td th:text="*{headquarters}" />
                <td>
                  <a
                    th:href="@{/studios/{id}(id = *{id})}"
                    class="btn btn-primary"
                    >Show</a
                  >
                </td>
                <td sec:authorize="hasAuthority('ADMIN')">
                  <a
                    th:href="@{/studios/edit/{id}(id = *{id})}"
                    class="btn btn-secondary"
                    >Update</a
                  >
                </td>
                <td sec:authorize="hasAuthority('ADMIN')">
                  <button
                    type="button"
                    class="btn btn-danger"
                    data-bs-toggle="modal"
                    th:data-bs-target="'#delete-modal-' + *{id}"
                  >
                    Delete
                  </button>
                  <div
                    th:id="'delete-modal-' + *{id}"
                    class="modal fade"
                    tabindex="-1"
                    aria-labelledby="delete-modal"
                    aria-hidden="true"
                  >
                    <div class="modal-dialog modal-dialog-centered">
                      <div class="modal-content">
                        <div class="modal-header">
                          <h5
                            th:text="|Deleting *{name}?|"
                            class="modal-title fs-5"
                          />
                          <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                          ></button>
                        </div>
                        <div class="modal-body">
                          You sure to delete <strong>"[[*{name}]]"</strong>?
                        </div>
                        <div class="modal-footer">
                          <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                          >
                            Close
                          </button>
                          <form
                            id="delete"
                            action="#"
                            th:action="@{/studios/delete/{id}(id = *{id})}"
                            method="post"
                          >
                            <button class="btn btn-danger" type="submit">
                              Delete
                            </button>
                          </form>
                        </div>
                      </div>
                    </div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
  <script
    th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"
  ></script>
</html>
